<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take a Break - Registo</title>
    <link rel="stylesheet" href="/css/app.css">
    <style>
        .form input[type="text"], 
        .form input[type="email"], 
        .form input[type="password"],
        .form select {
            position: relative;
        }
        .form label::after {
            content: " *";
            color: red;
        }
    </style>
</head>
<body>
<div class="page">
    <div class="card wide">
        <h1>Registo de Funcionario</h1>
        <p th:if="${erro}" class="error" th:text="${erro}"></p>
        <form method="post" action="/registo" class="form" onsubmit="return validarFormulario()">
            <label>Nome</label>
            <input type="text" name="nome" required pattern="^[A-Za-zÀ-ÖØ-öø-ÿ ]{2,120}$" title="Use apenas letras e espaços (2 a 120 caracteres).">
            
            <label>Email</label>
            <input type="email" name="email" required pattern="^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$" title="Introduza um email válido.">
            
            <label>Telefone</label>
            <input type="text" name="telefone" required pattern="^\d{9}$" title="Use 9 dígitos numéricos.">
            
            <label>Palavra-passe</label>
            <input type="password" name="password" id="password" required>
            
            <label>Confirmar Palavra-passe</label>
            <input type="password" name="passwordConfirm" id="passwordConfirm" required>
            
            <label>Departamento</label>
            <select name="departamento" required>
                <option value="">-- Selecione Departamento --</option>
                <option value="Administração de Sistemas">Administração de Sistemas</option>
                <option value="Administração de Infra-estrutura de Rede">Administração de Infra-estrutura de Rede</option>
                <option value="Manutenção de Equipamento e Serviços">Manutenção de Equipamento e Serviços</option>
                <option value="Suporte aos Utilizadores">Suporte aos Utilizadores</option>
                <option value="Desenvolvimento e Implementação de Novos Projetos">Desenvolvimento e Implementação de Novos Projetos</option>
            </select>
            
            <label>Escalao</label>
            <select name="escalao" required>
                <option value="">-- Selecione Escalão --</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
                <option value="11">11</option>
                <option value="12">12</option>
            </select>
            
            <label>Morada</label>
            <input type="text" name="morada" pattern="^[A-Za-zÀ-ÖØ-öø-ÿ0-9 .,'/-]{3,160}$" title="Use letras, números e pontuação simples (3 a 160).">
            
            <label>Codigo-postal</label>
            <input type="text" name="codigoPostal" pattern="^\d{4}-\d{3}$" title="Use o formato XXXX-XXX.">
            
            <label>Localidade</label>
            <input type="text" name="localidade" pattern="^[A-Za-zÀ-ÖØ-öø-ÿ ]{2,120}$" title="Use apenas letras e espaços.">
            
            <label>Concelho</label>
            <input type="text" name="concelho" pattern="^[A-Za-zÀ-ÖØ-öø-ÿ ]{2,120}$" title="Use apenas letras e espaços.">
            
            <label>Distrito</label>
            <input type="text" name="distrito" pattern="^[A-Za-zÀ-ÖØ-öø-ÿ ]{2,120}$" title="Use apenas letras e espaços.">
            
            <button type="submit">Registar</button>
        </form>
        <a href="/index.html">Voltar ao login</a>
    </div>
</div>

<script>
function validarFormulario() {
    const password = document.getElementById('password').value.trim();
    const passwordConfirm = document.getElementById('passwordConfirm').value.trim();
    
    if (password !== passwordConfirm) {
        alert('As palavras-passe não coincidem. Verifique e tente novamente.');
        return false;
    }
    
    return true;
}
</script>
</body>
</html>
