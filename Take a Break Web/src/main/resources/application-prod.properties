spring.config.activate.on-profile=prod

# Run schema initialization so the tables are created on first deploy.
# Schema uses CREATE TABLE IF NOT EXISTS / DO $$ IF NOT EXISTS patterns -- safe to run always.
spring.sql.init.mode=always

# Enable template caching in production.
spring.thymeleaf.cache=true

# Keep canonical host enforcement enabled in production by default.
app.force-canonical-host=true
