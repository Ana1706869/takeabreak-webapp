services:
  - type: web
    name: takeabreak-webapp
    env: docker
    region: frankfurt
    plan: free
    branch: master
    dockerfilePath: ./Take a Break Web/Dockerfile
    dockerContext: ./Take a Break Web

    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 10000
      - key: DB_URL
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
