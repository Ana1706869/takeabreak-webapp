<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take a Break - Editar Ausência</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="topbar">
    <div>
        <h2>Take a Break Web</h2>
        <p th:text="'Ola, ' + ${nome}"></p>
    </div>
    <a href="/logout" class="btn-link">Sair</a>
</div>

<div class="container">
    <section class="card" th:if="${folga}">
        <h3>Editar Ausência</h3>
        <form method="post" action="/folga/atualizar" class="form">
            <input type="hidden" name="id" th:value="${folga.folgaId()}">
            <div>
                <label>Funcionário</label>
                <input type="text" th:value="${folga.funcionarioNome()}" disabled>
            </div>
            <div>
                <label>Data Início</label>
                <input type="date" name="dataInicio" th:value="${folga.dataInicio()}" required>
            </div>
            <div>
                <label>Data Fim</label>
                <input type="date" name="dataFim" th:value="${folga.dataFim()}" required>
            </div>
            <div>
                <label>Motivo</label>
                <select name="motivo" required>
                    <option value="Doença" th:selected="${folga.motivo() == 'Doença'}">Doença</option>
                    <option value="Doença com regime de proteção pela Segurança Social" th:selected="${folga.motivo() == 'Doença com regime de proteção pela Segurança Social'}">Doença com regime de proteção pela Segurança Social</option>
                    <option value="Férias" th:selected="${folga.motivo() == 'Férias'}">Férias</option>
                    <option value="Falecimento de cônjuge" th:selected="${folga.motivo() == 'Falecimento de cônjuge'}">Falecimento de cônjuge</option>
                    <option value="Falecimento de avós" th:selected="${folga.motivo() == 'Falecimento de avós'}">Falecimento de avós</option>
                    <option value="Falecimento de pais" th:selected="${folga.motivo() == 'Falecimento de pais'}">Falecimento de pais</option>
                    <option value="Falecimento de filhos" th:selected="${folga.motivo() == 'Falecimento de filhos'}">Falecimento de filhos</option>
                    <option value="Falecimento de irmãos" th:selected="${folga.motivo() == 'Falecimento de irmãos'}">Falecimento de irmãos</option>
                    <option value="Licença de casamento" th:selected="${folga.motivo() == 'Licença de casamento'}">Licença de casamento</option>
                    <option value="Licença de maternidade" th:selected="${folga.motivo() == 'Licença de maternidade'}">Licença de maternidade</option>
                    <option value="Licença de paternidade" th:selected="${folga.motivo() == 'Licença de paternidade'}">Licença de paternidade</option>
                    <option value="Assistência à família" th:selected="${folga.motivo() == 'Assistência à família'}">Assistência à família</option>
                    <option value="Assistência a filho" th:selected="${folga.motivo() == 'Assistência a filho'}">Assistência a filho</option>
                    <option value="Assistência a filho deficiente ou com doença crónica" th:selected="${folga.motivo() == 'Assistência a filho deficiente ou com doença crónica'}">Assistência a filho deficiente ou com doença crónica</option>
                </select>
            </div>
            <div>
                <label>Remuneração</label>
                <input type="text" th:value="${folga.remuneracao()}" disabled>
            </div>
            <div style="display: flex; gap: 10px;">
                <button type="submit" class="ok-btn">Guardar Alterações</button>
                <a href="/dashboard" class="btn-link" style="padding: 10px 14px;">Cancelar</a>
            </div>
        </form>
    </section>

    <section class="card" th:unless="${folga}">
        <p>Ausência não encontrada.</p>
        <a href="/dashboard" class="btn-link">Voltar ao Dashboard</a>
    </section>
</div>
</body>
</html>
