server.port=${PORT:8081}

spring.datasource.url=${DB_URL:jdbc:h2:mem:takeabreak;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=${DATASOURCE_DRIVER:org.h2.Driver}

spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
spring.sql.init.schema-locations=${SCHEMA_LOC:classpath:schema-h2.sql}

spring.thymeleaf.cache=false
spring.mvc.hiddenmethod.filter.enabled=true

logging.level.org.springframework.jdbc.core=INFO

app.canonical-host=${APP_CANONICAL_HOST:takeabreak.pt}
app.force-canonical-host=${APP_FORCE_CANONICAL_HOST:true}
